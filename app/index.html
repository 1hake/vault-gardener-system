<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #f5f5f7;
      padding: 6px;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }
    .island {
      background: rgba(14, 14, 16, 0.92);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 26px;
      padding: 8px 8px 8px 18px;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.55),
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 0.5px 0 rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    header {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      height: 44px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #48484a;
      flex-shrink: 0;
      transition: background 0.25s ease;
    }
    .dot.active {
      background: #30d158;
      box-shadow: 0 0 8px rgba(48, 209, 88, 0.6);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0.5); }
      50%      { box-shadow: 0 0 0 6px rgba(48, 209, 88, 0); }
    }
    .label {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.1px;
      color: #f5f5f7;
    }
    .count {
      font-size: 11px;
      font-weight: 500;
      color: #8e8e93;
      font-variant-numeric: tabular-nums;
    }

    button {
      -webkit-app-region: no-drag;
      border: none;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .launch {
      background: rgba(255, 255, 255, 0.1);
      color: #f5f5f7;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 22px;
      font-weight: 300;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .launch:hover { background: rgba(255, 255, 255, 0.18); }
    .launch:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.25); }

    .runs {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-right: 2px;
      -webkit-app-region: no-drag;
    }

    .run {
      background: rgba(255, 255, 255, 0.045);
      border: 0.5px solid rgba(255, 255, 255, 0.04);
      border-radius: 13px;
      padding: 0 12px;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s ease;
      animation: slideIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .run:hover { background: rgba(255, 255, 255, 0.07); }
    .run.expanded {
      background: rgba(255, 255, 255, 0.06);
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 10px 14px;
      cursor: default;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .run-header {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 16px;
    }
    .run-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .run-dot.running { background: #ffd60a; animation: fade 1.4s ease-in-out infinite; }
    .run-dot.done    { background: #30d158; }
    .run-dot.error   { background: #ff453a; }
    @keyframes fade {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }
    .run-meta {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: #c7c7cc;
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
      font-size: 11px;
      letter-spacing: -0.1px;
    }
    .run-time {
      font-size: 10px;
      color: #636366;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .run-detail {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: #636366;
      text-transform: uppercase;
    }
    .logs, .diff {
      background: rgba(0, 0, 0, 0.3);
      border: 0.5px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
      font-size: 10.5px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
      color: #c7c7cc;
      max-height: 180px;
      overflow-y: auto;
      -webkit-user-select: text;
      user-select: text;
    }
    .logs::-webkit-scrollbar,
    .diff::-webkit-scrollbar,
    body::-webkit-scrollbar { width: 0; }
    .diff .added   { color: #30d158; }
    .diff .removed { color: #ff453a; }
    .diff .meta    { color: #636366; }
    .diff .hunk    { color: #64d2ff; }
    .empty-state {
      color: #48484a;
      font-style: italic;
      padding: 6px 0;
    }
  </style>
</head>
<body>
  <div class="island" id="island">
    <header>
      <span id="dot" class="dot"></span>
      <span class="label">Gardener</span>
      <span id="count" class="count"></span>
      <button class="launch" id="launch" title="Lancer (clic droit : effacer finis)">+</button>
    </header>
    <div id="runs" class="runs"></div>
  </div>
  <script>
    const { ipcRenderer } = require("electron");
    const dot = document.getElementById("dot");
    const count = document.getElementById("count");
    const runsEl = document.getElementById("runs");
    const islandEl = document.getElementById("island");
    const launchBtn = document.getElementById("launch");

    launchBtn.onclick = () => ipcRenderer.send("launch-gardener");
    launchBtn.oncontextmenu = (e) => {
      e.preventDefault();
      ipcRenderer.send("clear-finished");
    };

    let lastRuns = [];
    let expandedId = null;
    let cachedDiff = "";
    let diffTimer = null;

    function fmtTime(r) {
      const end = r.endedAt || Date.now();
      const s = Math.round((end - r.startedAt) / 1000);
      return s < 60 ? `${s}s` : `${Math.floor(s/60)}m${String(s%60).padStart(2,"0")}`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    function colorizeDiff(text) {
      if (!text) return '<span class="empty-state">(aucun changement dans le vault)</span>';
      return text.split("\n").map((line) => {
        const e = escapeHtml(line);
        if (line.startsWith("+++") || line.startsWith("---") || line.startsWith("diff ") || line.startsWith("index ")) return `<span class="meta">${e}</span>`;
        if (line.startsWith("@@")) return `<span class="hunk">${e}</span>`;
        if (line.startsWith("+"))  return `<span class="added">${e}</span>`;
        if (line.startsWith("-"))  return `<span class="removed">${e}</span>`;
        return e;
      }).join("\n");
    }

    async function refreshDiff() {
      if (expandedId == null) return;
      try {
        cachedDiff = await ipcRenderer.invoke("get-diff");
      } catch {
        cachedDiff = "(erreur)";
      }
      const diffEl = document.getElementById(`diff-${expandedId}`);
      if (diffEl) diffEl.innerHTML = colorizeDiff(cachedDiff);
    }

    function toggleExpand(id) {
      if (expandedId === id) {
        expandedId = null;
        cachedDiff = "";
        if (diffTimer) { clearInterval(diffTimer); diffTimer = null; }
      } else {
        expandedId = id;
        cachedDiff = "(chargement…)";
        refreshDiff();
        if (diffTimer) clearInterval(diffTimer);
        diffTimer = setInterval(refreshDiff, 2000);
      }
      render(lastRuns);
    }

    function render(runs) {
      lastRuns = runs;
      const active = runs.filter((r) => r.status === "running").length;
      dot.classList.toggle("active", active > 0);
      count.textContent = runs.length ? String(runs.length) : "";

      if (!runs.length) {
        runsEl.innerHTML = "";
        expandedId = null;
        if (diffTimer) { clearInterval(diffTimer); diffTimer = null; }
        measureAndResize();
        return;
      }

      runsEl.innerHTML = runs.map((r) => {
        const expanded = r.id === expandedId;
        const last = r.last || "";
        const time = fmtTime(r);
        if (!expanded) {
          return `
            <div class="run" data-id="${r.id}">
              <span class="run-dot ${r.status}"></span>
              <span class="run-meta">${escapeHtml(last)}</span>
              <span class="run-time">${time}</span>
            </div>`;
        }
        const lines = (r.lines || []).slice(-30).map(escapeHtml).join("\n");
        return `
          <div class="run expanded" data-id="${r.id}">
            <div class="run-header">
              <span class="run-dot ${r.status}"></span>
              <span class="run-meta">#${r.id} · pid ${r.pid} · ${r.status}</span>
              <span class="run-time">${time}</span>
            </div>
            <div class="run-detail">
              <div class="section-title">Log</div>
              <div class="logs">${lines || '<span class="empty-state">(rien)</span>'}</div>
              <div class="section-title">Git diff (vault)</div>
              <div class="diff" id="diff-${r.id}">${colorizeDiff(cachedDiff)}</div>
            </div>
          </div>`;
      }).join("");

      for (const el of runsEl.querySelectorAll(".run")) {
        el.onclick = (e) => {
          if (e.target.closest(".logs") || e.target.closest(".diff")) return;
          toggleExpand(Number(el.dataset.id));
        };
      }

      measureAndResize();
    }

    function measureAndResize() {
      requestAnimationFrame(() => {
        const h = islandEl.getBoundingClientRect().height + 12; // body padding
        ipcRenderer.send("set-height", h);
      });
    }

    ipcRenderer.on("runs", (_, runs) => render(runs));

    setInterval(() => {
      if (lastRuns.some((r) => r.status === "running")) render(lastRuns);
    }, 1000);
  </script>
</body>
</html>
